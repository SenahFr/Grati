<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gratitude Archive</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <h1 class="title">GRATITUDE</h1>

      <!-- Hover Navigation -->
      <section class="subhead-nav" aria-label="Prayer navigation">
        <div class="nav-item" data-image="/images/prayercards-01.jpg">
          <a href="#" class="hover-heading">Morning</a>
        </div>
        <div class="nav-item" data-image="/images/prayercards-03.jpg">
          <a href="#" class="hover-heading">St. Francis</a>
        </div>
        <div class="nav-item" data-image="/images/prayercards-02.jpg">
          <a href="#" class="hover-heading">Evening</a>
        </div>
      </section>

      <!-- Hover preview card -->
      <div id="hover-image-card" aria-hidden="true" style="display:none;">
        <img id="hover-image" alt="Prayer card preview" />
      </div>

      <!-- Archive grid -->
      <section class="grid-wrapper" aria-label="56 day gratitude archive">
        <div class="grid" id="archive-grid"></div>
        <div class="entry-overlay-layer" id="entry-overlay-layer" aria-live="polite"></div>
      </section>


      <!-- Admin login panel (hidden by default) -->
      <div id="admin-login" class="hidden">
        <h2>Admin Login</h2>
        <p id="login-error" class="hidden">Login failed</p>
        <button id="login-btn">Login with Supabase</button>
      </div>

      <div id="admin-panel" class="hidden">
        <h2>Admin Panel</h2>
        <p>Today's date: <span id="today-date"></span></p>
        <!-- Add admin controls here -->
      </div>
    </main>

    <!-- JS -->
    <script type="module" src="/script.js"></script>
<script type="module" src="/admin.js"></script>
  </body>
</html>
